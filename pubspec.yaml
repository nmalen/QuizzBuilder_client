name: mobile_client
description: "QuizzBuilder - A multilingual quiz game with free and paid themes."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.0.0
  
  # State Management
  provider: ^6.0.0
  
  # HTTP & API
  http: ^1.1.0
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  
  # JSON Serialization
  json_annotation: ^4.8.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # In-App Purchases
  in_app_purchase: ^3.1.0
  
  # Date & Time
  intl: ^0.20.2
  
  # Navigation & Routing
  go_router: ^13.0.0
  
  # Localization
  flutter_localizations:
    sdk: flutter
  
  # Utilities
  uuid: ^4.0.0
  equatable: ^2.0.5
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  # App Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Locales
  generate: true

# Localization configuration
flutter_intl:
  enabled: true
